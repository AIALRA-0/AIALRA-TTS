input_dir: "/srv/aialra/no-local-media"
output_dir: "/srv/aialra/previews"
work_dir: "/srv/aialra/runs"

privacy:
  allow_cloud_api: false
  allow_upload_media: false
  allow_voice_clone_without_consent: false

translation:
  target_language: "zh-CN"
  supported_target_languages: ["zh-CN", "zh-TW", "zh-HK", "en", "ja", "ko", "es", "fr", "de"]
  allow_unlisted_targets: true
  style: "natural_chinese_lecture"
  quality_mode: "best_quality"
  max_zh_chars_per_subtitle_line: 22

asr:
  supported_languages: ["auto", "en", "zh", "zh-CN", "yue", "ja", "ko", "es", "fr", "de"]

tts:
  supported_languages: ["zh-CN", "zh", "cmn", "mandarin", "yue"]

webui:
  enabled: true
  host: "0.0.0.0"
  port: 7861
  execution_mode: "worker_queue"
  username: "${WEBUI_ADMIN_USERNAME}"
  password: "${WEBUI_ADMIN_PASSWORD}"
  session_secret: "${WEBUI_SESSION_SECRET}"
  bind_local_only: false
  upload_dir: "/srv/aialra/previews/uploads"
  allow_remote_media_uploads: false
  preview_dir: "/srv/aialra/previews/cache"
  preview_manifest: "/srv/aialra/previews/cache/preview_manifest.json"
  job_dir: "/srv/aialra/runs/webui_jobs"
  platform_dir: "/srv/aialra/platform"
  max_upload_mb: 1024
  worker_preview_max_upload_mb: 256
  worker_artifact_cache_max_upload_mb: 2048
  default_local_quota_gb: 500
  default_remote_quota_gb: 10
  default_project_quota_gb: 500
  max_active_jobs_per_user: 2
  max_active_jobs_global: 8
  worker_token: "${WORKER_SHARED_TOKEN}"
  worker_auth_mode: "hmac"
  worker_signature_max_skew_seconds: 300
  download_secret: "${WEBUI_DOWNLOAD_SECRET}"
  signed_url_ttl_seconds: 900
  cleanup_older_than_days: 7

worker:
  status_interval_seconds: 15
  log_tail_lines: 160
  upload_previews: true
  preview_source_output_key: "zh_dub_mp4"
  preview_max_width: 854
  preview_video_bitrate: "700k"
  preview_audio_bitrate: "96k"
  preview_max_seconds: 0
  thumbnail_at_seconds: 1.0
