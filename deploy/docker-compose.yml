services:
  aialra-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:7861:7861"
    volumes:
      - ./config.remote.yaml:/app/config.yaml:ro
      - aialra_platform:/srv/aialra/platform
      - aialra_runs:/srv/aialra/runs
      - aialra_previews:/srv/aialra/previews
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7861/readyz', timeout=5).status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  aialra_platform:
  aialra_runs:
  aialra_previews:
